name: Deploy to Yandex Cloud

on:
  push:
    branches: [ main ]

env:
  REGISTRY: cr.yandex
  IMAGE_NAME: my-app

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Yandex Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: json_key
        password: ${{ secrets.YC_SA_KEY }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ secrets.REGISTRY_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          ${{ env.REGISTRY }}/${{ secrets.REGISTRY_ID }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy to VM
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.VM_IP }}
        username: ${{ secrets.VM_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "${{ secrets.YC_SA_KEY }}" > /tmp/key.json
          docker login --username json_key --password-stdin cr.yandex < /tmp/key.json
          docker pull cr.yandex/${{ secrets.REGISTRY_ID }}/my-app:${{ github.sha }}
          docker stop my-app || true
          docker rm my-app || true
          docker run -d \
            --name my-app \
            --restart unless-stopped \
            -p 80:80 \
            -e VERSION="${{ github.sha }}" \
            cr.yandex/${{ secrets.REGISTRY_ID }}/my-app:${{ github.sha }}
          rm /tmp/key.json